name: Auto Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tag name
        id: get_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Zip
        run: |
          PLUGIN_NAME="astrbot_plugin_keywordfilter"
          ZIP_NAME="${PLUGIN_NAME}-${{ steps.get_tag.outputs.TAG_NAME }}.zip"
          
          # 创建一个临时的构建目录（在当前目录之外）
          BUILD_DIR="/tmp/plugin_build"
          mkdir -p "${BUILD_DIR}/${PLUGIN_NAME}"
          
          # 复制除 dist 目录外的所有文件
          rsync -av --exclude='.git' --exclude='.github' --exclude='.gitignore' --exclude='__pycache__' --exclude='.vscode' --exclude='.idea' --exclude='.trae' --exclude='*.zip' ./ "${BUILD_DIR}/${PLUGIN_NAME}/"
          
          # 打包
          cd "${BUILD_DIR}"
          zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" "${PLUGIN_NAME}"
          
          echo "ZIP_PATH=${ZIP_NAME}" >> $GITHUB_OUTPUT
        id: pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          name: Release ${{ steps.get_tag.outputs.TAG_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
